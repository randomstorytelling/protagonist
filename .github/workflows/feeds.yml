name: feeds
# Cloud-always-on live feed: pulls completed Google Tasks and writes them into the user's PRIVATE
# Firestore game state. Runs in GitHub's cloud (no Mac needed). Credentials come from repo Secrets
# (never committed). WHOOP stays on the Mac launchd (its token rotates and is managed by the WHOOP MCP).
on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (GitHub best-effort scheduling)
  workflow_dispatch: {}        # manual trigger (used for testing)

concurrency:
  group: feeds
  cancel-in-progress: false

jobs:
  google-tasks:
    runs-on: ubuntu-latest
    env:
      # CRITICAL: the engine derives a rep's day-index from the PROCESS-local timezone (device offset). The GitHub
      # runner is UTC, so without this an evening-Central rep (after ~7pm, when UTC already rolled over) would be
      # filed under TOMORROW's day — wrong Daily-Quest coverage + an early quest rollover. Pin the runner to the app.
      TZ: America/Chicago
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Materialize credentials from the single FEED_CREDS secret
        env:
          FEED_CREDS: ${{ secrets.FEED_CREDS }}
        run: |
          mkdir -p "$HOME/.config/configstore" "$HOME/.config/google-tasks"
          node -e '
            let c;
            try { c = JSON.parse(process.env.FEED_CREDS || ""); }
            catch (e) { console.error("FEED_CREDS is not valid JSON"); process.exit(1); }   // never echo the secret
            const fs = require("fs"), os = require("os"), p = require("path"), d = os.homedir();
            fs.writeFileSync(p.join(d, ".config/configstore/firebase-tools.json"), JSON.stringify({ tokens: { refresh_token: c.firebase_refresh_token } }));
            fs.writeFileSync(p.join(d, ".config/google-tasks/client.json"), JSON.stringify(c.google_tasks_client));
            fs.writeFileSync(p.join(d, ".config/google-tasks/tokens.json"), JSON.stringify(c.google_tasks_tokens));
          '
      - name: Sync completed Google Tasks -> Firestore
        env:
          PROTAG_UID: ${{ secrets.PROTAG_UID }}
        run: node tasks-feed.js 7
      # Calendar runs after Tasks (same job = sequential, so they can't race the users/{uid} write). Auto-credits
      # started calendar events into the right dimension, so just living your scheduled day fills the Daily Quest.
      # Needs the shared Google token to also have the calendar.readonly scope (see FEED_CREDS).
      - name: Sync started Google Calendar events -> Firestore
        if: always()
        env:
          PROTAG_UID: ${{ secrets.PROTAG_UID }}
        run: node calendar-feed.js 7   # wide window: dedup makes re-credits free, so a skipped/delayed cron never drops a day
      # WHOOP runs AFTER tasks in the same job (sequential) so the two can't race the users/{uid} write.
      # Its WHOOP token + client creds live in the private Firestore doc _feed/whoop (not in any secret).
      - name: Sync WHOOP -> Firestore
        if: always()   # WHOOP must still sync even if the Tasks step failed (independent feeds)
        env:
          PROTAG_UID: ${{ secrets.PROTAG_UID }}
        run: node whoop-cloud-feed.js
